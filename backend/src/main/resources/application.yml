server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/${DB_NAME:tnnilam}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:tamilnilam-citizen-portal-secret-key-2024-very-long-secret}
    expiration-ms: 3600000 # 1 hour
  otp:
    expiry-minutes: 10
    length: 6
    mock: true

firebase:
  # Path to Firebase service account JSON key.
  # Download from: Firebase Console → Project Settings → Service Accounts → Generate new private key
  # Leave blank to use Application Default Credentials
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

logging:
  level:
    in.gov.tnnilam: DEBUG
